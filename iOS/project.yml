name: CurtainBlindLog
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: "1"
  DEVELOPMENT_TEAM: W7Q885Q59C
targets:
  CurtainBlindLog:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.curtainlog
        DEVELOPMENT_TEAM: W7Q885Q59C
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Curtain & Blind Log"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
    info:
      properties:
        UILaunchScreen: {}
        NSFaceIDUsageDescription: "Used to lock sensitive entries."
  CurtainBlindLogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: CurtainBlindLog
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
  CurtainBlindLogUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: CurtainBlindLog
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  CurtainBlindLog:
    build:
      targets:
        CurtainBlindLog: all
    test:
      targets:
        - CurtainBlindLogTests
        - CurtainBlindLogUITests
    run:
      config: Debug
